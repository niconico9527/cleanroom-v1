<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洁净室自动报价系统</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>洁净室自动报价系统</h1>

    <div class="nav-tabs">
        <button id="tabSales" class="active" onclick="switchTab('sales')">🏢 业务员报价系统</button>
        <button id="tabAdmin" onclick="switchTab('admin')">⚙️ 管理员后台</button>
    </div>

    <div id="moduleSales" class="module active">
        <div class="section">
            <h2>1. 客户需求配置与自动核算</h2>
            
            <div class="top-toolbar">
                <label>行业类型：</label>
                <select id="industrySelect">
                    <option value="食品">食品</option>
                    <option value="药品">药品</option>
                    <option value="医院">医院</option>
                    <option value="化妆品">化妆品</option>
                    <option value="医疗器械">医疗器械</option>
                    <option value="生物安全">生物安全</option>
                    <option value="电子">电子</option>
                    <option value="无特殊要求">无特殊要求</option>
                </select>

                <label style="margin-left: 15px;">点数执行标准：</label>
                <select id="standardSelect" onchange="handleStandardChange()">
                    <option value="ISO">ISO 14644-1 (国际标准)</option>
                    <option value="GB50591">GB 50591 (洁净室施工及验收规范)</option>
                    <option value="GB">常规电子/工业 (国标)</option>
                </select>

                <label style="margin-left: 15px; color: #c0392b; font-weight: bold;">报价折扣：</label>
                <input type="number" id="discountFactor" value="1.0" step="0.1" oninput="calculateAll()" title="1.0为原价，0.8为8折，1.2为上浮20%" style="width: 50px; text-align: center; border-color: #c0392b;">
            </div>

            <div class="basis-wrapper">
                <div class="basis-container">
                    <label>检测依据 (可多选/可自定义)：</label>
                    <div class="multi-select-box" id="testBasisBox">
                        </div>
                </div>
                <div class="basis-container">
                    <label>评价依据 (可多选/可自定义)：</label>
                    <div class="multi-select-box" id="evalBasisBox">
                        </div>
                </div>
            </div>
            
            <div class="action-bar">
                <div style="display: flex; align-items: center;">
                    <button class="btn btn-success" onclick="addRoom()">+ 添加房间</button>
                    
                    <input type="file" id="importExcelInput" style="display: none;" accept=".xlsx, .xls, .csv" onchange="handleImportExcel(event)">
                    <button class="btn-import" onclick="document.getElementById('importExcelInput').click()">📤 一键导入</button>
                    
                    <a href="javascript:void(0);" onclick="downloadImportTemplate()" style="margin-left: 12px; font-size: 13px; color: #3498db; text-decoration: underline;">下载模板</a>
                </div>
                
                <button class="btn-export" onclick="exportToExcel()">📥 导出报价单</button>
            </div>
            
            <table id="roomTable">
                <thead>
                    <tr>
                        <th style="width: 90px;">房间名称</th>
                        <th style="width: 110px;">洁净度等级<br><button class="th-btn-small" onclick="fillDownRoomLevel()">↓ 向下填充</button></th>
                        <th style="width: 70px;">面积(m²)</th>
                        <th>检测项目与点数配置</th> 
                        <th style="width: 110px;">房间总报价</th>
                        <th style="width: 60px;">操作</th>
                    </tr>
                </thead>
                <tbody id="roomBody">
                    </tbody>
            </table>

            <div class="summary-box">
                系统汇总总计 (仅内部可见): <span class="total-price" id="grandTotal">¥ 0.00</span>
            </div>
        </div>
    </div>

    <div id="moduleAdmin" class="module">
        <div class="admin-panel">
            <h2>内部检测项目阶梯单价配置 (共14项)</h2>
            
            <div class="admin-header">
                <label>配置目标级别：</label>
                <select id="adminClassLevel" onchange="loadAdminPricesToUI()"></select>
                <button class="btn btn-warning" onclick="copyToAllLevels()" style="margin-left: 15px;">一键将此配置复制到所有级别</button>
            </div>
            
            <p style="color: #c0392b; font-size: 13px;">请先选择上方的【级别】，下方表格将显示该级别专属的报价方案。输入第一行数据后可使用“向下填充”按钮快速录入。</p>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th>检测项目</th>
                        <th>点数分界点 (包含此数) <br><button class="btn btn-warning btn-small" onclick="fillDownColumn('th')">↓ 向下填充</button></th>
                        <th>点数 ≤ 分界点 的单价(元) <br><button class="btn btn-warning btn-small" onclick="fillDownColumn('pb')">↓ 向下填充</button></th>
                        <th>点数 > 分界点 的单价(元) <br><button class="btn btn-warning btn-small" onclick="fillDownColumn('pa')">↓ 向下填充</button></th>
                    </tr>
                </thead>
                <tbody id="adminPriceBody">
                    </tbody>
            </table>
            
            <button class="btn btn-success" onclick="saveAdminPrices()" style="margin-top: 20px;">💾 保存当前级别配置</button>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
