<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洁净室自动报价系统</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <!-- 品牌页头 -->
        <div class="page-header">
            <i class="ph ph-flask header-icon"></i>
            <h1>洁净室自动报价系统</h1>
            <div style="margin-left: auto; display: flex; align-items: center;">
                <a href="说明文件/index.html" target="_blank"
                    style="color: #ffffff; text-decoration: none; display: flex; align-items: center; gap: 6px; font-weight: 500; font-size: 14px; background: rgba(255,255,255,0.15); padding: 8px 16px; border-radius: 6px; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.2);">
                    <i class="ph ph-book-open" style="font-size: 16px;"></i> 新版说明文档
                </a>
            </div>
        </div>

        <div id="moduleSales">
            <div class="section">
                <h2><i class="ph ph-gear-six"></i> 客户需求配置与自动核算</h2>

                <!-- 卡片1: 工具栏 -->
                <div class="top-toolbar">
                    <label>行业类型：</label>
                    <select id="industrySelect">
                        <option value="食品">食品</option>
                        <option value="药品">药品</option>
                        <option value="医院">医院</option>
                        <option value="化妆品">化妆品</option>
                        <option value="医疗器械">医疗器械</option>
                        <option value="生物安全">生物安全</option>
                        <option value="电子">电子</option>
                        <option value="无特殊要求">无特殊要求</option>
                    </select>

                    <label>点数执行标准：</label>
                    <select id="standardSelect" onchange="handleStandardChange()">
                        <option value="ISO">ISO 14644-1 (国际标准)</option>
                        <option value="GB50591">GB 50591 (洁净室施工及验收规范)</option>
                        <option value="GB">常规电子/工业 (国标)</option>
                        <option value="GB16292_OLD">GB16292旧版</option>
                    </select>

                    <label class="discount-label">报价折扣：</label>
                    <input type="number" id="discountFactor" value="1.0" step="0.1" oninput="calculateAll()"
                        title="1.0为原价，0.8为8折，1.2为上浮20%" class="discount-input">

                </div>

                <!-- 卡片2: 依据选择区 -->
                <div class="basis-wrapper">
                    <div class="basis-container">
                        <label>检测依据 (可多选/可自定义)：</label>
                        <div class="multi-select-box" id="testBasisBox"></div>
                    </div>
                    <div class="basis-container">
                        <label>评价依据 (可多选/可自定义)：</label>
                        <div class="multi-select-box" id="evalBasisBox"></div>
                    </div>
                </div>

                <!-- 卡片3: 数据源信息条 -->
                <div class="info-card">
                    <div>
                        <div class="info-card-title">
                            <i class="ph ph-calculator"></i> 当前价格数据源：
                        </div>
                        <div class="info-card-status" id="currentConfigStatus">
                            <i class="ph-fill ph-check-circle"></i>
                            当前状态：已使用本地系统缓存价格库
                        </div>
                    </div>
                    <div class="info-card-actions">
                        <button class="btn btn-primary" onclick="manualFetchCloudConfig()">
                            <i class="ph ph-cloud-arrow-down" style="font-size: 16px;"></i> 同步云端最新数据
                        </button>
                        <input type="file" id="priceUpload" accept=".crm,.json" style="display: none;"
                            onchange="handleImportPrices(event)">
                        <button class="btn btn-secondary" onclick="document.getElementById('priceUpload').click()">
                            <i class="ph ph-folder-arrow-down" style="font-size: 16px;"></i> 导入本地数据文件
                        </button>
                    </div>
                </div>

                <!-- 卡片4: 操作栏 -->
                <div class="action-bar">
                    <div class="action-bar-left">
                        <button class="btn btn-success" onclick="addRoom()">
                            <i class="ph ph-plus" style="font-weight: bold;"></i> 添加房间
                        </button>

                        <input type="file" id="importExcelInput" style="display: none;" accept=".xlsx, .xls, .csv"
                            onchange="handleImportExcel(event)">
                        <button class="btn btn-secondary" onclick="document.getElementById('importExcelInput').click()">
                            <i class="ph ph-file-xls" style="font-size: 16px;"></i> 智能表格导入
                        </button>

                        <button class="btn btn-secondary" onclick="downloadImportTemplate()">
                            <i class="ph ph-download-simple" style="font-size: 16px;"></i> 下载标准模板
                        </button>
                    </div>

                    <div style="display: flex; gap: 12px; align-items: center;">
                        <button class="btn btn-danger" onclick="clearAllData()">
                            <i class="ph ph-trash" style="font-size: 16px;"></i> 清空
                        </button>
                        <button class="btn btn-export" onclick="exportToExcel()">
                            <i class="ph ph-download-simple" style="font-size: 16px;"></i> 导出报价
                        </button>
                    </div>
                </div>

                <!-- 房间表格 -->
                <table id="roomTable">
                    <thead>
                        <tr>
                            <th style="width: 90px;">房间名称</th>
                            <th style="width: 110px;">洁净度等级<br><button class="th-btn-small"
                                    onclick="fillDownRoomLevel()"><i class="ph ph-arrow-down"></i> 向下填充</button>
                            </th>
                            <th style="width: 70px;">面积(m²)</th>
                            <th>检测项目与点数配置<br><button class="btn-toggle-collapse" onclick="toggleAllRoomsCollapse()"><i
                                        class="ph ph-arrows-in-line-vertical"></i>
                                    展开/折叠所有明细</button></th>
                            <th style="width: 110px;">房间总报价</th>
                            <th style="width: 60px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="roomBody">
                    </tbody>
                </table>

                <!-- 总计区域 -->
                <div class="summary-box">
                    系统汇总总计 : <span class="total-price" id="grandTotal">¥ 0.00</span>
                </div>
            </div>
        </div>

    </div>

    <!-- 顶层气泡提示容器 -->
    <div id="toast-container"></div>

    <script src="script.js"></script>
</body>

</html>
