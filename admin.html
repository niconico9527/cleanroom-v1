<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洁净系统底价管理后台</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 顶部全局导航栏 (SaaS Navbar) -->
    <header class="page-header">
        <div class="header-container">
            <h1 style="display: flex; align-items: center; gap: 8px;">
                <i class="ph ph-sliders-horizontal header-icon" style="opacity: 1; color: var(--primary);"></i>
                洁净室报价系统-后台管理
            </h1>
            <div class="header-actions">
                <a href="说明文件/index.html" target="_blank" class="btn btn-secondary" style="text-decoration: none;">
                    <i class="ph ph-book-open" style="font-size: 16px; color: var(--primary);"></i> 说明文档
                </a>
            </div>
        </div>
    </header>

    <div class="container admin-container">

        <!-- 云端 / 离线 双卡片区 -->
        <div class="admin-cards-row">
            <!-- 云端协作区 -->
            <div class="sync-card">
                <div class="sync-card-title">
                    <i class="ph ph-cloud-check"></i> 云端发布与同步区
                </div>
                <div class="sync-card-actions">
                    <button class="btn btn-primary" onclick="adminPullFromCloud()">
                        <i class="ph ph-cloud-arrow-down" style="font-size: 16px;"></i> 拉取云端数据
                    </button>
                    <button id="btnCloudPush" class="btn btn-export" onclick="pushToCloud()">
                        <i class="ph ph-rocket-launch" style="font-size: 16px;"></i> 发布至云端
                    </button>
                </div>
                <div id="currentConfigStatus" class="info-card-status">
                    <i class="ph-fill ph-check-circle"></i>
                    当前状态：已使用本地系统缓存价格库
                </div>
            </div>

            <!-- 本地离线区 -->
            <div class="offline-card">
                <div class="offline-card-title">
                    <i class="ph ph-hard-drives"></i> 离线配置包管理区
                </div>
                <div class="offline-card-actions">
                    <input type="file" id="adminPriceUpload" accept=".crm,.json" style="display: none;"
                        onchange="importAdminEncryptedConfig(event)">
                    <button class="btn btn-admin-dark" onclick="document.getElementById('adminPriceUpload').click()">
                        <i class="ph ph-folder-open" style="font-size: 16px;"></i> 导入本地数据
                    </button>
                    <button class="btn btn-admin-darker" onclick="exportEncryptedConfig()">
                        <i class="ph ph-download-simple" style="font-size: 16px;"></i> 导出数据到本地
                    </button>
                </div>
            </div>
        </div>

        <!-- 管理员配置面板 -->
        <div class="admin-panel" id="moduleAdmin">
            <div class="admin-header">
                <label>配置目标级别：</label>
                <select id="adminClassLevel" onchange="loadAdminPricesToUI()"></select>
                <button class="btn btn-copy-config" onclick="openCopyModal()">
                    <i class="ph ph-copy" style="font-size: 16px;"></i> 复制当前配置到其它级别...
                </button>
            </div>

            <p class="admin-tip">操作指南：首先选择上方的【级别】，下方表格将显示该级别对应的单点底价方案。输入第一行数据后可使用"向下填充"按钮快速录入。</p>

            <table class="admin-table">
                <thead>
                    <tr>
                        <th>检测项目</th>
                        <th>
                            阈值点数（分界点）<br>
                            <button class="th-btn-small" onclick="fillDownColumn('th')"><i
                                    class="ph ph-arrow-circle-down"></i> 向下填充</button>
                        </th>
                        <th>
                            阈值单价以内（元/点）<br>
                            <button class="th-btn-small" onclick="fillDownColumn('pb')"><i
                                    class="ph ph-arrow-circle-down"></i> 向下填充</button>
                        </th>
                        <th>
                            超阈值单价（元/点）<br>
                            <button class="th-btn-small" onclick="fillDownColumn('pa')"><i
                                    class="ph ph-arrow-circle-down"></i> 向下填充</button>
                        </th>
                    </tr>
                </thead>
                <tbody id="adminPriceBody">
                </tbody>
            </table>
        </div>
    </div>

    <!-- 复制配置的高级弹窗 -->
    <div id="copyModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3><i class="ph ph-copy" style="margin-right: 8px;"></i>复制配置到特定级别</h3>
            <div class="modal-select-all">
                <label style="cursor: pointer;"><input type="checkbox" id="chkAllLevels"
                        onchange="toggleAllModalLevels(this)"> <b style="color: var(--brand-600);">全选所有级别</b></label>
            </div>
            <div class="level-groups" id="levelGroupsContainer">
                <!-- 由 JavaScript 动态生成分组 -->
            </div>
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="closeCopyModal()">取消</button>
                <button class="btn btn-success" onclick="executeCopy()">确认应用</button>
            </div>
        </div>
    </div>

    <!-- Toast 容器 -->
    <div id="toast-container"></div>

    <script src="admin.js"></script>
</body>

</html>
